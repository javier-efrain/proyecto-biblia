<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia Interactiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc,71; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; line-height: 1.8; overflow-x: hidden; }
        .hero { height: 45vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 30px; margin-bottom: 25px; border-left: 5px solid var(--primary); }
        
        /* Estilos del Carrusel */
        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 15px;
            margin: 20px 0;
            padding-bottom: 10px;
        }
        .carousel-item {
            flex: 0 0 85%;
            scroll-snap-align: center;
        }
        .carousel-item img {
            width: 100%;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .caption {
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 8px;
            text-align: center;
            font-style: italic;
        }

        .verse { font-style: italic; border-left: 2px solid var(--primary); padding-left: 15px; margin: 15px 0; color: #fff; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        
        /* Esconder barra de scroll pero permitir deslizar */
        .carousel::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="estudio-content"></div>

    <script>
        fetch('datos.json')
            .then(res => res.json())
            .then(data => {
                const est = data[0];
                document.documentElement.style.setProperty('--primary', est.color);
                
                // Función para generar el HTML de una galería
                const crearGaleria = (fotos) => {
                    if (!fotos || fotos.length === 0) return '';
                    return `
                        <div class="carousel">
                            ${fotos.map(f => `
                                <div class="carousel-item">
                                    <img src="${f.url}" alt="Imagen">
                                    <div class="caption">${f.caption || ''}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                };

                const html = `
                    <div class="hero" style="background-image: linear-gradient(to bottom, transparent, var(--bg)), url('${est.hero_img}')">
                        <div class="container"><h1>${est.titulo}</h1></div>
                    </div>
                    <div class="container">
                        <div class="card">
                            <h2>🏛️ Contexto</h2>
                            <p>${est.contexto.texto}</p>
                            ${crearGaleria(est.contexto.galeria)}
                        </div>
                        <div class="card">
                            <h2>🔍 Exégesis</h2>
                            <p>${est.exegesis.texto}</p>
                            ${est.exegesis.versiculos.map(v => `<div class="verse"><strong>${v.cita}:</strong> ${v.texto}</div>`).join('')}
                            ${crearGaleria(est.exegesis.galeria)}
                        </div>
                        <div class="card">
                            <h2>💓 Aplicación</h2>
                            <p>${est.aplicacion.texto}</p>
                        </div>
                    </div>
                `;
                document.getElementById('estudio-content').innerHTML = html;
            });
    </script>
</body>
</html>

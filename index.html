<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia Interactiva | Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* Menú Lateral */
        .sidebar {
            position: fixed; left: -250px; top: 0; width: 250px; height: 100%;
            background: #181818; transition: 0.3s; z-index: 1000; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; cursor: pointer; z-index: 1001; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 5px; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 15px 0; border-bottom: 1px solid #333; }

        /* Banner Principal (Hero) */
        .main-banner {
            width: 100%;
            height: 65vh;
            background: linear-gradient(to bottom, transparent, var(--bg)), url('https://via.placeholder.com/1200x600/1a1a1a/ffffff?text=Cargando+Banner...');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Ajuste de márgenes para que nada quede tapado */
        .content-body { padding-top: 20px; }
        .row { padding: 20px 0; margin-left: 80px; } /* Movido a la derecha */
        .row-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 15px; padding-left: 15px; border-left: 4px solid var(--primary); }
        
        .scroll-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; scroll-behavior: smooth; }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* Miniaturas */
        .thumb-horizontal { flex: 0 0 280px; aspect-ratio: 16/9; background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .thumb-vertical { flex: 0 0 150px; aspect-ratio: 2/3; background: #222; border-radius: 6px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; padding: 10px; }
        .thumb-horizontal img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-horizontal:hover { transform: scale(1.05); }
        .disabled { filter: grayscale(1); opacity: 0.4; cursor: not-allowed; }

        /* Vista de Estudio (Oculta) */
        #view-estudio { display: none; padding-top: 60px; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <nav class="sidebar" id="sidebar">
        <h2 style="font-family: 'Playfair Display'; color: var(--primary);">Biblia App</h2>
        <a href="#" onclick="location.reload()">🏠 Inicio</a>
        <a href="#">📖 Vida de Jesús</a>
        <a href="#">📜 Nuevo Testamento</a>
        <a href="#">⚡ Temas</a>
    </nav>

    <div id="view-home">
        <div class="main-banner" id="main-banner">
            <div>
                <h1 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin:0;">La Vida de Jesús</h1>
                <p style="color: var(--primary); font-weight: bold;">Estudio Cronológico Armonizado</p>
            </div>
        </div>

        <div class="content-body">
            <div class="row">
                <h3 class="row-title">Novedades y Vida de Jesús</h3>
                <div class="scroll-container" id="fila-novedades"></div>
            </div>

            <div class="row">
                <h3 class="row-title">Biblioteca: Nuevo Testamento</h3>
                <div class="scroll-container" id="fila-libros"></div>
            </div>

            <div class="row">
                <h3 class="row-title">Estudios Temáticos</h3>
                <div class="scroll-container" id="fila-temas"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        const librosNT = [
            { n: "Mateo", a: false }, { n: "Marcos", a: false }, { n: "Lucas", a: false }, { n: "Juan", a: false },
            { n: "Hechos", a: false }, { n: "Romanos", a: false }, { n: "1 Cor", a: false }, { n: "2 Cor", a: false },
            { n: "Gálatas", a: false }, { n: "Efesios", a: false }, { n: "Filipenses", a: false }, { n: "Colosenses", a: false },
            { n: "Santiago", a: true, c: "#2ecc71" }, { n: "Filemón", a: true, c: "#3498db" }
        ];

        // Cargar Libros NT
        const fLibros = document.getElementById('fila-libros');
        librosNT.forEach(l => {
            const d = document.createElement('div');
            d.className = `thumb-vertical ${l.a ? '' : 'disabled'}`;
            if(l.a) d.style.borderColor = l.c;
            d.innerHTML = l.n;
            fLibros.appendChild(d);
        });

        // Cargar Datos desde el JSON
        fetch('datos.json')
            .then(res => res.json())
            .then(data => {
                const fNovedades = document.getElementById('fila-novedades');
                const fTemas = document.getElementById('fila-temas');

                data.forEach(estudio => {
                    const thumb = document.createElement('div');
                    thumb.className = 'thumb-horizontal';
                    thumb.innerHTML = `
                        <img src="${estudio.hero_img}" alt="${estudio.titulo}">
                        <div style="position:absolute; bottom:0; padding:10px; background:rgba(0,0,0,0.6); width:100%; font-size:0.8rem;">
                            ${estudio.titulo}
                        </div>
                    `;
                    
                    // Separar por categoría (Si no tiene categoría, va a Temas por defecto)
                    if(estudio.categoria === "Vida de Jesús" || estudio.categoria === "Novedades") {
                        fNovedades.appendChild(thumb);
                    } else {
                        fTemas.appendChild(thumb);
                    }
                });

                // Actualizar Banner con el último estudio
                if(data.length > 0) {
                    document.getElementById('main-banner').style.backgroundImage = `linear-gradient(to bottom, transparent, #0f0f0f), url('${data[0].hero_img}')`;
                }
            });
    </script>
</body>
</html>

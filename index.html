<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia Interactiva | Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* Menú Lateral */
        .sidebar {
            position: fixed; left: -250px; top: 0; width: 250px; height: 100%;
            background: #181818; transition: 0.3s; z-index: 1000; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; cursor: pointer; z-index: 1001; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 15px 0; border-bottom: 1px solid #333; }

        /* Filas de Contenido */
        .row { padding: 20px 0; margin-left: 15px; }
        .row-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid var(--primary); }
        .scroll-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px; scroll-behavior: smooth; }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* Formatos de Miniaturas */
        .thumb-horizontal { flex: 0 0 250px; aspect-ratio: 16/9; background: #222; border-radius: 8px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .thumb-vertical { flex: 0 0 140px; aspect-ratio: 2/3; background: #222; border-radius: 5px; cursor: pointer; border: 2px solid transparent; }
        .thumb-horizontal img, .thumb-vertical img { width: 100%; height: 100%; object-fit: cover; }
        
        .thumb-horizontal:hover, .thumb-vertical:hover { transform: scale(1.05); }
        .thumb-title { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; padding: 5px; font-size: 0.8rem; }

        /* Libros Desactivados (Blanco y Negro) */
        .disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed !important; }

        /* Contenedor del Estudio (Oculto por defecto) */
        #view-estudio { display: none; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <nav class="sidebar" id="sidebar">
        <h2 style="font-family: 'Playfair Display'">Menú</h2>
        <a href="#" onclick="showHome()">🏠 Inicio</a>
        <a href="#">📖 Nuevo Testamento</a>
        <a href="#">⚡ Temas</a>
        <a href="#" style="color: var(--primary)">Premium Group 💼</a>
    </nav>

    <div id="view-home">
        <div style="height: 60px;"></div> <div class="row">
            <h3 class="row-title">Novedades y Vida de Jesús</h3>
            <div class="scroll-container" id="fila-novedades">
                </div>
        </div>

        <div class="row">
            <h3 class="row-title">Biblioteca: Nuevo Testamento</h3>
            <div class="scroll-container" id="fila-libros">
                </div>
        </div>
    </div>

    <div id="view-estudio">
        </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function showHome() { 
            document.getElementById('view-home').style.display = 'block';
            document.getElementById('view-estudio').style.display = 'none';
            toggleMenu();
        }

        // Simulación de carga de datos (luego lo conectamos a tu JSON real)
        const librosNT = [
            { nombre: "Mateo", activo: false },
            { nombre: "Marcos", activo: false },
            { nombre: "Lucas", activo: false },
            { nombre: "Juan", activo: false },
            { nombre: "Santiago", activo: true, color: "#2ecc71" },
            { nombre: "Filemón", activo: true, color: "#3498db" }
        ];

        // Renderizar Libros
        const filaLibros = document.getElementById('fila-libros');
        librosNT.forEach(l => {
            const div = document.createElement('div');
            div.className = `thumb-vertical ${l.activo ? '' : 'disabled'}`;
            div.style.borderColor = l.activo ? l.color : 'transparent';
            div.innerHTML = `<div style="padding: 20px; text-align: center;">${l.nombre}</div>`;
            filaLibros.appendChild(div);
        });

        // Aquí iría el fetch de tu datos.json para las novedades...
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia Interactiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; line-height: 1.8; }
        .hero { height: 45vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px 20px; transition: 0.5s; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 30px; margin-bottom: 25px; border-left: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .greek { color: var(--primary); font-weight: bold; background: rgba(255,255,255,0.05); padding: 2px 5px; border-radius: 4px; }
        .verse { font-style: italic; border-left: 2px solid var(--primary); padding-left: 15px; margin: 15px 0; color: #fff; }
        @media (max-width: 600px) { h1 { font-size: 1.8rem; } .hero { height: 35vh; } }
    </style>
</head>
<body>

    <div id="estudio-content">
        </div>

    <script>
        // Esta función lee el archivo JSON que creamos
        fetch('datos.json')
            .then(response => response.json())
            .then(data => {
                const estudio = data[0]; // Por ahora cargamos el primero (Santiago)
                document.documentElement.style.setProperty('--primary', estudio.color);
                
                const html = `
                    <div class="hero" style="background-image: linear-gradient(to bottom, transparent, var(--bg)), url('${estudio.hero_img}')">
                        <div class="container">
                            <h1>${estudio.titulo}</h1>
                        </div>
                    </div>
                    <div class="container">
                        <div class="card">
                            <h2>🏛️ Contexto</h2>
                            <p>${estudio.contexto.texto}</p>
                        </div>
                        <div class="card">
                            <h2>🔍 Exégesis</h2>
                            <p>${estudio.exegesis.texto}</p>
                            ${estudio.exegesis.versiculos.map(v => `<div class="verse"><strong>${v.cita}:</strong> ${v.texto}</div>`).join('')}
                        </div>
                        <div class="card" style="border-color: #fff">
                            <h2>💓 Aplicación</h2>
                            <p>${estudio.aplicacion.texto}</p>
                        </div>
                    </div>
                `;
                document.getElementById('estudio-content').innerHTML = html;
            });
    </script>
</body>
</html>
